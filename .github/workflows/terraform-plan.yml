name: Terraform Plan & Validate

on:
  pull_request:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: 1.7.0
  GOOGLE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GOOGLE_REGION: us-central1

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov for IaC scanning
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/gcp
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
        continue-on-error: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: checkov-results.sarif

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: infrastructure/gcp/environments/base
        run: terraform fmt -check -recursive ../../

      - name: Terraform Validate
        working-directory: infrastructure/gcp/environments/base
        run: terraform validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: infrastructure/gcp/environments/base
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/gcp/environments/base
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Save plan artifact
        working-directory: infrastructure/gcp/environments/base
        run: terraform show -json tfplan > tfplan.json

      - name: Upload plan
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: infrastructure/gcp/environments/base/tfplan*
          retention-days: 5

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/gcp/environments/base/tfplan', 'utf8');
            const comment = `## Terraform Plan
            \`\`\`
            ${plan.substring(0, 3000)}
            \`\`\`
            ${plan.length > 3000 ? '... (plan truncated, see artifacts for full output)' : ''}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
