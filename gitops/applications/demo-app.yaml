# Application Deployment Example
# This demonstrates how to deploy applications via Flux GitOps

apiVersion: v1
kind: Namespace
metadata:
  name: applications
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: applications
  labels:
    app: demo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        iam.gke.io/gcp-service-account: demo-app-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
    spec:
      serviceAccountName: demo-app-sa
      containers:
      - name: demo-app
        image: gcr.io/YOUR_PROJECT_ID/docker-repo/demo-app:latest
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: REDIS_HOST
          value: redis-primary.internal
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app-sa
  namespace: applications
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: applications
spec:
  selector:
    app: demo-app
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app
  namespace: applications
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
